{% extends "base.html" %}

{% block title %}
Workout Tracker: Log Workout
{% endblock %}

{% block content %}

<h1>Log Workout</h1>

<!-- creates the form for logging the workout -->
<form method="POST">
  <!-- creates the notes box -->
  <p>
    Notes (optional):<br>
    <textarea name="notes" rows="3" cols="40"></textarea>
  </p>

  <hr>

  <!-- creates the exercise input fields -->
  {% for ex in exercises %}
    {% set order = ex[2] %}
    <p>
      {{ order }}. {{ ex[1] }}
      weight: <input type="number" step="0.25" name="weight_{{ order }}">
      reps: <input type="number" name="reps_{{ order }}">
    </p>
  {% endfor %}

  <button type="submit">Save workout</button>
</form>


<a href="{{ url_for('pages.workouts') }}">Back to Workouts</a>

{% endblock %}
